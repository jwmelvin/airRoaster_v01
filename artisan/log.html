<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>airRoaster log</title>
<style>
  body { font-family: sans-serif; padding: 1em; max-width: 700px; }
  #out { background: #1e1e1e; color: #d4d4d4; padding: 1em; min-height: 200px;
         font-family: monospace; font-size: 0.85em; white-space: pre-wrap;
         border-radius: 4px; margin-top: 0.75em; }
  .error  { color: #f48771; }
  .log    { color: #9cdcfe; }
  .status { color: #b5cea8; }
  .other  { color: #d4d4d4; }
  input  { font-size: 1em; padding: 0.3em 0.5em; width: 160px; }
  button { font-size: 1em; padding: 0.3em 0.8em; margin-left: 0.4em; cursor: pointer; }
  #indicator { display: inline-block; width: 10px; height: 10px; border-radius: 50%;
               background: #888; margin-left: 0.6em; vertical-align: middle; }
  #indicator.open   { background: #4ec94e; }
  #indicator.closed { background: #f48771; }
</style>
</head>
<body>
<h2>airRoaster WebSocket console</h2>

<input id="ip" placeholder="192.168.1.x" />
<button onclick="connect()">Connect</button>
<button onclick="send('LOG')">LOG</button>
<button onclick="clearOut()">Clear</button>
<span id="indicator" class="closed"></span>
<span id="status-text" style="font-size:0.85em; color:#888; margin-left:0.4em">disconnected</span>

<div id="out"></div>

<script>
let ws;

function connect() {
  const ip = document.getElementById("ip").value.trim();
  if (!ip) return;
  if (ws) ws.close();

  ws = new WebSocket("ws://" + ip + ":81");

  ws.onopen = () => {
    setStatus("connected", true);
    log("-- connected to " + ip + " --", "other");
    ws.send("LOG");
  };

  ws.onclose = () => {
    setStatus("disconnected", false);
    log("-- disconnected --", "other");
  };

  ws.onerror = () => {
    setStatus("error", false);
    log("-- connection error --", "error");
  };

  ws.onmessage = e => {
    let cls = "other";
    try {
      const obj = JSON.parse(e.data);
      if (obj.pushMessage === "error") cls = "error";
      else if (obj.pushMessage === "log")    cls = "log";
      else if (obj.pushMessage === "status") cls = "status";
    } catch (_) {}
    log(e.data, cls);
  };
}

function send(cmd) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(cmd);
    log("> " + cmd, "other");
  } else {
    log("not connected", "error");
  }
}

function log(text, cls) {
  const out = document.getElementById("out");
  const line = document.createElement("span");
  line.className = cls;
  line.textContent = text + "\n";
  out.appendChild(line);
  out.scrollTop = out.scrollHeight;
}

function clearOut() {
  document.getElementById("out").innerHTML = "";
}

function setStatus(text, open) {
  document.getElementById("status-text").textContent = text;
  const ind = document.getElementById("indicator");
  ind.className = open ? "open" : "closed";
}

// Restore last-used IP
window.onload = () => {
  const saved = localStorage.getItem("airRoaster_ip");
  if (saved) document.getElementById("ip").value = saved;
};

document.getElementById("ip").addEventListener("change", e => {
  localStorage.setItem("airRoaster_ip", e.target.value);
});
</script>
</body>
</html>
